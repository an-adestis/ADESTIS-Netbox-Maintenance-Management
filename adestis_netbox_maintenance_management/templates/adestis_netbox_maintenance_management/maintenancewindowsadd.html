{% extends 'generic/object_edit.html' %}
{% load helpers %}
{% load i18n %}
{% load buttons %}
{% load plugins %}
{% load static %}



{% block head %}
    <script type="text/javascript" src="{% static 'adestis_netbox_maintenance_management/js/helloworld.js' %}"></script>
{% endblock %}


{% block content %}
  {{ block.super }}
    <script src="https://unpkg.com/cronstrue@1.48.0/dist/cronstrue.min.js"></script>


    <script type="text/javascript" src="{% static 'plugins:adestis_netbox_maintenance_management/helloworld.js' %}"></script>

  <script>
        document.addEventListener("DOMContentLoaded", function () {

            var schedulefields = document.getElementById("id_schedule_type");
            
            var starttimefield = document.getElementById("id_start_day");
            var stoptimefield = document.getElementById("id_end_day")

            var recurrencefield = document.getElementById("id_recurrence_type")

            var weekdaysfield = document.getElementById("id_weekdays")
            var weekinmonth = document.getElementById("id_week_in_month-ts-control")
            var monthdaysfield = document.getElementById("id_monthdays")

            var specialordinal = document.getElementById("id_special_ordinal")
            

            const recurenceContainer = recurrencefield.closest(".row.mb-3");
            const startContainer = starttimefield.closest(".row.mb-3");
            const stopContainer = stoptimefield.closest(".row.mb-3");

            const weekdayContainer = weekdaysfield.closest(".row.mb-3");
            const weekinmonthContainer = weekinmonth.closest(".row.mb-3");
            const monthdayContainer = monthdaysfield.closest(".row.mb-3");
            
            const specialordinalContainer = specialordinal.closest(".row.mb-3")

            startContainer.style.display = 'none'
            stopContainer.style.display = 'none'
            recurenceContainer.style.display = 'none'

            weekdayContainer.style.display = 'none'
            weekinmonthContainer.style.display = 'none'
            monthdayContainer.style.display = 'none'

            specialordinalContainer.style.display = 'none'

        function updateVisibility() {
            const scheduleValue = schedulefields.value;
            const recurrenceValue = recurrencefield.value;
            
            // schedule_type abhängige Felder
            if (scheduleValue === "recurring") {
                recurenceContainer.style.display = '';
            } else {
                recurenceContainer.style.display = 'none';
            }

            if (scheduleValue === "one_time") {
                startContainer.style.display = '';
                stopContainer.style.display = '';
            } else {
                startContainer.style.display = 'none';
                stopContainer.style.display = 'none';
            }

            // recurrence_type abhängige Felder (nur wenn "recurring" aktiv)
            if (scheduleValue === "recurring") {
                if (recurrenceValue === "weekly") {
                    weekdayContainer.style.display = '';
                    weekinmonthContainer.style.display = '';
                } else {
                    weekdayContainer.style.display = 'none';
                    weekinmonthContainer.style.display = 'none';
                }

                if (recurrenceValue === "monthly") {
                    monthdayContainer.style.display = '';
                } else {
                    monthdayContainer.style.display = 'none';
                }

                if (
                    recurrenceValue === "special_ordinal"
                ) {
                    specialordinalContainer.style.display = '';
                } else {
                    specialordinalContainer.style.display = 'none';
                }
            } else {
                // Alle recurrence-Felder ausblenden, wenn nicht "recurring"
                weekdayContainer.style.display = 'none';
                monthdayContainer.style.display = 'none';
                specialordinalContainer.style.display = 'none';
                weekinmonthContainer.style.display = 'none';
            }
        }

        // Event-Listener
        schedulefields.addEventListener("change", updateVisibility);
        recurrencefield.addEventListener("change", updateVisibility);

        // Initiale Sichtbarkeit setzen
        updateVisibility();
        const helpText = document.getElementById("id_special_ordinal_helptext");

        function isValidCronPart(part, min, max) {
            if (part === '*' || part === '?') return true;

            // Unterstützung für Listen, Ranges und Schritte (einfachste Form)
            const parts = part.split(',');

            return parts.every(p => {
                if (p.includes('/')) {
                    [p] = p.split('/'); // nur linken Teil nehmen (z.B. "5/2" → "5")
                }

                if (p.includes('-')) {
                    const [start, end] = p.split('-').map(Number);
                    return (
                        !isNaN(start) &&
                        !isNaN(end) &&
                        start >= min && start <= max &&
                        end >= min && end <= max &&
                        start <= end
                    );
                }

                const num = Number(p);
                return !isNaN(num) && num >= min && num <= max;
            });
        }

        function validateCron(raw) {
            if (typeof raw !== 'string') return false;

            const parts = raw.trim().split(/\s+/);
            if (parts.length !== 5) return false;

            const [minute, hour, day, month, weekday] = parts;

            return (
                isValidCronPart(minute, 0, 59) &&
                isValidCronPart(hour, 0, 23) &&
                isValidCronPart(day, 1, 31) &&
                isValidCronPart(month, 1, 12) &&
                isValidCronPart(weekday, 0, 6)
            );
        }

        function updateCronDescription() {
            const raw = specialordinal?.value || "";

            let helpText = document.getElementById("id_special_ordinal_helptext");
            if (!helpText) {
                helpText = document.createElement("small");
                helpText.id = "id_special_ordinal_helptext";
                helpText.className = "form-text text-muted";
                specialordinal.insertAdjacentElement("afterend", helpText);
            }

            if (!raw) {
                helpText.textContent = "Enter a cron expression (e.g., 0 0 * * 1). A readable description will be displayed below.";
                specialordinal.setCustomValidity("");
                return;
            }

            if (!validateCron(raw)) {
                helpText.textContent = "❌ Ungültiger Cron-Ausdruck";
                specialordinal.setCustomValidity("Ungültiger Cron-Ausdruck");
            } else {
                try {
                    const description = cronstrue.toString(raw);
                    helpText.textContent = description;  // ersetzt Hinweis durch Beschreibung
                    specialordinal.setCustomValidity("");
                } catch (e) {
                    helpText.textContent = "❌ Fehler beim Interpretieren des Ausdrucks";
                    specialordinal.setCustomValidity("Fehler beim Interpretieren des Ausdrucks");
                }
            }
        }

        specialordinal.addEventListener("input", updateCronDescription);

        // Initial einmal ausführen
        updateCronDescription();    

        });
    </script>
    
{% endblock %}
